<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./src/style.css" />
        <script type="module" src="./src/main.js"></script>
        <title>Quit It</title>
    </head>
    <body>
        <header class="header">
            <div class="logo-container">
                <img class="logo" src="./logo-no-smoking.svg" alt="" />
            </div>
            <h1>Quit It</h1>
        </header>

        <main class="main">
            <section class="card-container">
                <article class="dashboard-card">
                    <div class="logo-container">
                        <img
                            class="cig-logo"
                            src="./cigarette-svgrepo-com.svg"
                            alt=""
                        />
                    </div>
                    <p class="card-category">Cigarettes Smoked Today</p>
                    <p class="card-number">23</p>
                </article>

                <article class="dashboard-card">
                    <div class="logo-container">
                        <img class="cig-logo" src="./cash-outline.svg" alt="" />
                    </div>
                    <p class="card-category">Money Smoked Today</p>
                    <p class="card-number">$10000.23</p>
                </article>

                <article class="dashboard-card">
                    <div class="logo-container">
                        <img
                            class="cig-logo"
                            src="./grave-illustration-3-svgrepo-com.svg"
                            alt=""
                        />
                    </div>
                    <p class="card-category">Life Lost Today</p>
                    <p class="card-number">00:00:00</p>
                </article>

                <article class="dashboard-card">
                    <p class="card-category">Cigarettes Smoked Today</p>
                    <p class="card-number">23</p>
                </article>

                <article class="dashboard-card">
                    <p class="card-category">Cigarettes Smoked Today</p>
                    <p class="card-number">23</p>
                </article>
            </section>
        </main>

        <footer class="footer">
            <div class="circle">
                <a href="#">
                    <span>
                        <img
                            id="add-btn"
                            class="add-btn"
                            src="./add-circle-outline.svg"
                            alt=""
                        />
                    </span>
                </a>
            </div>
        </footer>

        <dialog id="log-cigarette" class="dialog">
            <form class="log-form">
                <label for="date-input">Date:</label>
                <input type="date" name="date" id="date-input" required />

                <label for="cig-input">Number Smoked</label>
                <input
                    type="number"
                    name="num-of-cigs"
                    id="cig-input"
                    required
                    min="0"
                    max="100"
                />

                <button class="submit-btn">Add Entry</button>
            </form>
        </dialog>
    </body>
</html>
